<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub: Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #8B5CF6;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input, textarea, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8B5CF6;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #8B5CF6;
            color: white;
        }

        .btn-primary:hover {
            background: #7C3AED;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(139, 92, 246, 0.3);
        }

        .btn-success {
            background: #F59E0B;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-success:hover {
            background: #D97706;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #DC2626;
        }

        .courses-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .courses-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .course-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            background: #fafafa;
        }

        .course-card:hover {
            border-color: #8B5CF6;
            transform: translateY(-4px);
            box-shadow: 0 6px 12px rgba(139, 92, 246, 0.2);
        }

        .course-card h3 {
            color: #8B5CF6;
            margin-bottom: 12px;
            font-size: 1.4em;
        }

        .course-card p {
            color: #666;
            margin-bottom: 8px;
        }

        .course-meta {
            display: flex;
            gap: 15px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .course-meta span {
            font-size: 0.9em;
            color: #555;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-not-started {
            background: #FEE2E2;
            color: #DC2626;
        }

        .status-in-progress {
            background: #FEF3C7;
            color: #D97706;
        }

        .status-completed {
            background: #D1FAE5;
            color: #059669;
        }

        .course-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .message-success {
            background: #D1FAE5;
            color: #059669;
            border-left: 4px solid #059669;
        }

        .message-error {
            background: #FEE2E2;
            color: #DC2626;
            border-left: 4px solid #DC2626;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8B5CF6;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8B5CF6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #333;
            font-size: 1.6em;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 2em;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
        }

        .close-modal:hover {
            color: #333;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            header {
                padding: 20px;
            }

            .form-section, .courses-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 CodeCraftHub</h1>
            <p class="subtitle">Your Learning Management Platform</p>
        </header>

        <div id="messageContainer"></div>

        <div class="form-section">
            <h2>➕ Add New Course</h2>
            <form id="addCourseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input type="text" id="courseName" required placeholder="e.g., JavaScript Fundamentals">
                    </div>
                    <div class="form-group">
                        <label for="targetDate">Target Date *</label>
                        <input type="date" id="targetDate" required>
                    </div>
                    <div class="form-group">
                        <label for="courseStatus">Status *</label>
                        <select id="courseStatus" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="courseDescription">Description *</label>
                        <textarea id="courseDescription" required placeholder="Describe what you'll learn in this course..."></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Add Course</button>
            </form>
        </div>

        <div class="courses-section">
            <h2>📖 My Courses</h2>
            <div id="coursesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading courses...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Edit Course</h2>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editCourseForm">
                <input type="hidden" id="editCourseId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editCourseName">Course Name *</label>
                        <input type="text" id="editCourseName" required>
                    </div>
                    <div class="form-group">
                        <label for="editTargetDate">Target Date *</label>
                        <input type="date" id="editTargetDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editCourseStatus">Status *</label>
                        <select id="editCourseStatus" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="editCourseDescription">Description *</label>
                        <textarea id="editCourseDescription" required></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api/courses';

        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            messageDiv.textContent = message;
            container.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        function getStatusClass(status) {
            const statusMap = {
                'Not Started': 'status-not-started',
                'In Progress': 'status-in-progress',
                'Completed': 'status-completed'
            };
            return statusMap[status] || 'status-not-started';
        }

        async function fetchCourses() {
            try {
                const response = await fetch(API_BASE_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const courses = await response.json();
                displayCourses(courses);
            } catch (error) {
                console.error('Error fetching courses:', error);
                document.getElementById('coursesContainer').innerHTML = `
                    <div class="message message-error">
                        Failed to load courses. Make sure the API server is running at ${API_BASE_URL}
                    </div>
                `;
            }
        }

        function displayCourses(courses) {
            const container = document.getElementById('coursesContainer');

            if (courses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                        <h3>No courses yet</h3>
                        <p>Start your learning journey by adding your first course above!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.name}</h3>
                            <p>${course.description}</p>
                            <div class="course-meta">
                                <span>📅 ${formatDate(course.target_date)}</span>
                                <span class="status-badge ${getStatusClass(course.status)}">${course.status}</span>
                            </div>
                            <div class="course-meta">
                                <span style="font-size: 0.8em; color: #999;">Created: ${formatDate(course.created_at)}</span>
                            </div>
                            <div class="course-actions">
                                <button class="btn-success" onclick="openEditModal('${course.id}')">✏️ Edit</button>
                                <button class="btn-danger" onclick="deleteCourse('${course.id}')">🗑️ Remove</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        document.getElementById('addCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const courseData = {
                name: document.getElementById('courseName').value,
                description: document.getElementById('courseDescription').value,
                target_date: document.getElementById('targetDate').value,
                status: document.getElementById('courseStatus').value
            };

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Course added successfully! 🎉', 'success');
                document.getElementById('addCourseForm').reset();
                await fetchCourses();
            } catch (error) {
                console.error('Error adding course:', error);
                showMessage('Failed to add course. Please try again.', 'error');
            }
        });

        async function deleteCourse(courseId) {
            if (!confirm('Are you sure you want to delete this course?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Course deleted successfully!', 'success');
                await fetchCourses();
            } catch (error) {
                console.error('Error deleting course:', error);
                showMessage('Failed to delete course. Please try again.', 'error');
            }
        }

        let courses = [];

        async function openEditModal(courseId) {
            try {
                const response = await fetch(API_BASE_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                courses = await response.json();
                const course = courses.find(c => c.id === courseId);

                if (!course) {
                    showMessage('Course not found!', 'error');
                    return;
                }

                document.getElementById('editCourseId').value = course.id;
                document.getElementById('editCourseName').value = course.name;
                document.getElementById('editCourseDescription').value = course.description;
                document.getElementById('editTargetDate').value = course.target_date;
                document.getElementById('editCourseStatus').value = course.status;

                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                console.error('Error loading course:', error);
                showMessage('Failed to load course details.', 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });

        document.getElementById('editCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const courseId = document.getElementById('editCourseId').value;
            const courseData = {
                name: document.getElementById('editCourseName').value,
                description: document.getElementById('editCourseDescription').value,
                target_date: document.getElementById('editTargetDate').value,
                status: document.getElementById('editCourseStatus').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Course updated successfully! ✅', 'success');
                closeEditModal();
                await fetchCourses();
            } catch (error) {
                console.error('Error updating course:', error);
                showMessage('Failed to update course. Please try again.', 'error');
            }
        });

        fetchCourses();
    </script>
</body>
</html>
